<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f59b61">
  <title>SKB Orange เช็กอิน</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <main id="app" class="shell">
    <section id="loginView" class="login-view">
      <div class="brand-mark">S</div>
      <p class="eyebrow">SKB ORANGE</p><h1>เช็กอินกีฬาสี</h1>
      <p class="muted">จัดการรายชื่อและเช็กชื่อได้ในที่เดียว</p>
      <form id="loginForm" class="card form-stack">
        <label>ชื่อผู้ใช้<input name="username" autocomplete="username" required></label>
        <label>รหัสผ่าน<input name="password" type="password" autocomplete="current-password" required></label>
        <button class="primary" type="submit">เข้าสู่ระบบ <span>→</span></button>
      </form>
    </section>

    <section id="mainView" hidden>
      <header class="topbar"><div><p class="eyebrow">SKB ORANGE</p><h1>เช็กอิน</h1></div><button id="logoutButton" class="icon-button" aria-label="ออกจากระบบ">↗</button></header>
      <section id="dashboard" class="dashboard"></section>
      <section id="sessionPanel" class="panel"></section>
      <nav class="tabbar" aria-label="เมนูหลัก">
        <button data-tab="checkin" class="active"><span>✓</span> เช็กชื่อ</button>
        <button data-tab="students"><span>◉</span> รายชื่อ</button>
        <button data-tab="history"><span>◷</span> ประวัติ</button>
        <button data-tab="more"><span>•••</span> เพิ่มเติม</button>
      </nav>
    </section>
  </main>
  <div id="modalRoot"></div><div id="toast" role="status"></div>
</body>
</html>
